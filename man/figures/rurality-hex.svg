<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 600" width="520" height="600">
  <defs>
    <!-- Hex clip path (pointy-top) -->
    <clipPath id="hexClip">
      <polygon points="260,10 505,150 505,450 260,590 15,450 15,150"/>
    </clipPath>

    <!-- Vertical gradient: deep forest at top, lighter at bottom -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#143d28"/>
      <stop offset="100%" stop-color="#2d8a47"/>
    </linearGradient>

    <!-- Subtle radial glow behind the wordmark -->
    <radialGradient id="glow" cx="50%" cy="55%" r="55%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Web link to the right font in case the SVG is ever inlined in HTML -->
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,600;1,9..144,600;0,9..144,400;1,9..144,400;0,9..144,500..700;1,9..144,500..700&family=Inter:wght@600&display=swap');
      .wordmark { font-family: 'Fraunces', Georgia, serif; font-weight: 600;
                  font-variation-settings: 'opsz' 144, 'SOFT' 60, 'WONK' 1;
                  font-style: italic; fill: #fdfcf8; }
      .tagline  { font-family: 'Inter', sans-serif; font-weight: 600;
                  font-size: 16px; letter-spacing: 0.24em;
                  text-transform: uppercase; fill: #d4e5da; }
      .version  { font-family: 'Inter', sans-serif; font-weight: 600;
                  font-size: 13px; letter-spacing: 0.18em; fill: #9ad9b3; }
    ]]></style>
  </defs>

  <!-- Hex fill -->
  <g clip-path="url(#hexClip)">
    <rect width="520" height="600" fill="url(#bgGrad)"/>

    <!-- Topographic contour arcs (echoes the site's OG cards and hero) -->
    <g fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.16">
      <path d="M -60 140 Q 160 60 390 200 T 660 230"/>
      <path d="M -60 200 Q 170 130 390 260 T 660 290"/>
      <path d="M -60 260 Q 180 200 390 320 T 660 350"/>
      <path d="M -60 320 Q 190 270 390 380 T 660 410"/>
      <path d="M -60 380 Q 200 340 390 440 T 660 470"/>
      <path d="M -60 440 Q 210 410 390 500 T 660 520"/>
      <path d="M -60 500 Q 220 480 390 555 T 660 570"/>
    </g>

    <!-- Radial glow under the wordmark so the text reads against the arcs -->
    <rect width="520" height="600" fill="url(#glow)"/>

    <!-- rurality.app logo mark (bars over rolling hills) centered in the upper
         portion of the hex. Source: scripts/logo.svg (100x100 viewBox),
         scaled to 170x170 and positioned at x=(260-85)=175, y=95. -->
    <g transform="translate(175, 95) scale(1.7)">
      <rect width="100" height="100" rx="20" fill="#1a3a2a"/>
      <!-- Rolling hills -->
      <path d="M0 82 Q15 68 30 78 Q45 65 60 75 Q75 62 90 72 Q95 76 100 74 L100 100 L0 100 Z"
            fill="#2d5a3a" opacity="0.6"/>
      <path d="M0 88 Q20 75 40 84 Q55 72 70 80 Q85 70 100 80 L100 100 L0 100 Z"
            fill="#3a6b48" opacity="0.5"/>
      <!-- Bars rising from landscape -->
      <rect x="12" y="62" width="12" height="20" rx="3" fill="#c4704b"/>
      <rect x="28" y="48" width="12" height="34" rx="3" fill="#d4a843"/>
      <rect x="44" y="34" width="12" height="48" rx="3" fill="#b8c97a"/>
      <rect x="60" y="20" width="12" height="62" rx="3" fill="#7db87d"/>
      <rect x="76" y="8"  width="12" height="74" rx="3" fill="#f0ead6"/>
    </g>

    <!-- Wordmark — moved down to give the logo breathing room -->
    <text x="260" y="430" text-anchor="middle" class="wordmark" font-size="96">rurality</text>

    <!-- Tagline -->
    <text x="260" y="472" text-anchor="middle" class="tagline">rural · urban · continuum</text>

    <!-- Version / author micro-print near bottom point -->
    <text x="260" y="545" text-anchor="middle" class="version">cwimpy / rurality</text>
  </g>

  <!-- Hex stroke -->
  <polygon points="260,10 505,150 505,450 260,590 15,450 15,150"
           fill="none" stroke="#9ad9b3" stroke-width="4" stroke-linejoin="round"/>
</svg>
